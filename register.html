<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamFinder — Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <div class="header-left">
            <span class="logo">TeamFinder</span>
            <div class="header-center">
                <button class="nav-btn" onclick="window.location.href='index.html'">Главная</button>
                <button class="nav-btn" onclick="window.location.href='participants.html'">Участники</button>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-login" onclick="window.location.href='login.html'">Войти</button>
            <button class="btn-register">Регистрация</button>
        </div>
    </header>
    <main>
        <div class="login-card">
            <h1 class="login-title">Регистрация</h1>
            <form id="registerFormPage">
                <div class="form-group">
                    <label for="firstName">Имя</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Фамилия</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Введите фамилию" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" name="email" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Пароль</label>
                    <input type="password" id="registerPassword" name="password" placeholder="Введите пароль" required minlength="6">
                </div>
                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>
            <p class="register-text" style="margin-top: 18px; text-align: center; color: #636e72; font-size: 15px;">
                Уже есть аккаунт? <a href="login.html" style="color: #6c5ce7; font-weight: 700; text-decoration: none;">Войти</a>
            </p>
        </div>
    </main>
</body>
</html>
